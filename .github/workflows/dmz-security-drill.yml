name: dmz-security-drill

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  dmz-drill:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DMZ_DRILL_OWNER: SEC
      DMZ_ENFORCE_TRUST_SCENARIOS: "false"
      INTERNAL_SECRET: dmz-drill-internal-secret
      INTERNAL_SECRET_BOOTSTRAP: dmz-drill-internal-bootstrap
      VAULT_DEV_ROOT_TOKEN_ID: dmz-drill-vault-root
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate DMZ policy artifacts exist
        run: |
          test -f docs/ops/dmz-route-policy.md
          test -f docs/ops/dmz-network-mapping.md
          test -f docs/ops/dmz-abuse-response.md
          test -f docs/ops/dmz-trusted-proxies.md
          test -f docker-compose.dmz.yml
          test -f docker/nginx/templates/fixyz-edge-dmz.conf.template

      - name: Prepare drill metadata
        id: meta
        run: |
          ts="$(date -u +%Y%m%dT%H%M%SZ)"
          d="$(date -u +%Y%m%d)"
          out="docs/ops/evidence/dmz/${d}"
          mkdir -p "$out"
          echo "ts=$ts" >> "$GITHUB_OUTPUT"
          echo "day=$d" >> "$GITHUB_OUTPUT"
          echo "out_dir=$out" >> "$GITHUB_OUTPUT"

      - name: Run DMZ drill scenarios
        id: drill
        run: |
          set -euo pipefail
          TS="${{ steps.meta.outputs.ts }}"
          OUT_DIR="${{ steps.meta.outputs.out_dir }}"
          FAIL_COUNT=0
          RESULTS_JSON=""

          append_result() {
            local scenario="$1"
            local status="$2"
            local detail="$3"
            local file="${OUT_DIR}/dmz-${scenario}-${TS}.json"
            printf '{"scenario":"%s","status":"%s","owner":"%s","checked_at":"%s","detail":"%s"}\n' \
              "${scenario}" "${status}" "${DMZ_DRILL_OWNER}" "${TS}" "${detail}" > "${file}"
            if [[ -n "${RESULTS_JSON}" ]]; then
              RESULTS_JSON="${RESULTS_JSON},"
            fi
            RESULTS_JSON="${RESULTS_JSON}{\"scenario\":\"${scenario}\",\"status\":\"${status}\",\"file\":\"$(basename "${file}")\"}"
            if [[ "${status}" == "fail" ]]; then
              FAIL_COUNT=$((FAIL_COUNT + 1))
            fi
          }

          run_blocked_direct_internal_access() {
            local ok=1
            if docker compose -f docker-compose.yml -f docker-compose.dmz.yml config > compose.dmz.yaml; then
              for svc in channel-service corebank-service fep-gateway fep-simulator; do
                if awk "/^  ${svc}:/{flag=1;next}/^  [^ ]/{flag=0}flag" compose.dmz.yaml | grep -q 'published:'; then
                  ok=0
                fi
              done
              if ! awk '/^  edge-gateway:/{flag=1;next}/^  [^ ]/{flag=0}flag' compose.dmz.yaml | grep -q 'published: "80"'; then
                ok=0
              fi
              if ! awk '/^  edge-gateway:/{flag=1;next}/^  [^ ]/{flag=0}flag' compose.dmz.yaml | grep -q 'published: "443"'; then
                ok=0
              fi
              for svc in channel-service corebank-service fep-gateway fep-simulator edge-gateway mysql redis vault vault-init redis-recovery-probe; do
                if awk "/^  ${svc}:/{flag=1;next}/^  [^ ]/{flag=0}flag" compose.dmz.yaml | grep -q 'fix-net:'; then
                  ok=0
                fi
              done
              for svc in mysql redis vault vault-init; do
                if ! awk "/^  ${svc}:/{flag=1;next}/^  [^ ]/{flag=0}flag" compose.dmz.yaml | grep -q 'core-private-net:'; then
                  ok=0
                fi
              done
              if [[ "${ok}" == "1" ]]; then
                append_result "blocked-direct-internal-access" "pass" "DMZ compose contract enforces edge-only host exposure and removes inherited fix-net."
              else
                append_result "blocked-direct-internal-access" "fail" "DMZ compose contract check failed (port/network isolation mismatch)."
              fi
            else
              append_result "blocked-direct-internal-access" "fail" "Failed to render merged compose config."
            fi
          }

          run_edge_runtime_scenarios() {
            local net_name="dmz-drill-net"
            local edge_name="dmz-edge-drill"
            local mock_name="dmz-channel-mock"
            local edge_image="fixyz-edge-drill:latest"
            local edge_port
            local code
            local rl_hit=0
            local i=0
            local client_ip

            cleanup_runtime() {
              docker rm -f "${edge_name}" "${mock_name}" >/dev/null 2>&1 || true
              docker network rm "${net_name}" >/dev/null 2>&1 || true
            }

            trap cleanup_runtime EXIT
            cleanup_runtime

            if ! docker build -t "${edge_image}" ./docker/nginx >/dev/null; then
              append_result "route-method-deny" "fail" "Unable to build edge image for runtime drill."
              append_result "internal-namespace-deny" "fail" "Unable to build edge image for runtime drill."
              append_result "abuse-rate-limit" "fail" "Unable to build edge image for runtime drill."
              append_result "temporary-deny-window" "fail" "Unable to build edge image for runtime drill."
              return
            fi
            if ! docker network create "${net_name}" >/dev/null; then
              append_result "route-method-deny" "fail" "Unable to create runtime drill network."
              append_result "internal-namespace-deny" "fail" "Unable to create runtime drill network."
              append_result "abuse-rate-limit" "fail" "Unable to create runtime drill network."
              append_result "temporary-deny-window" "fail" "Unable to create runtime drill network."
              return
            fi
            if ! docker run -d --rm --name "${mock_name}" --network "${net_name}" hashicorp/http-echo:1.0.0 -listen=:8080 -text=ok >/dev/null; then
              append_result "route-method-deny" "fail" "Unable to start channel mock for runtime drill."
              append_result "internal-namespace-deny" "fail" "Unable to start channel mock for runtime drill."
              append_result "abuse-rate-limit" "fail" "Unable to start channel mock for runtime drill."
              append_result "temporary-deny-window" "fail" "Unable to start channel mock for runtime drill."
              return
            fi
            if ! docker run -d --rm \
              --name "${edge_name}" \
              --network "${net_name}" \
              -p 127.0.0.1::443 \
              -e EDGE_SERVER_NAME=localhost \
              -e EDGE_NGINX_TEMPLATE=/etc/nginx/templates/fixyz-edge-dmz.conf.template \
              -e CHANNEL_SERVICE_HOST="${mock_name}" \
              -e CHANNEL_SERVICE_PORT=8080 \
              -e EDGE_TRUSTED_PROXY_CIDR_1=127.0.0.1/32 \
              -e EDGE_TRUSTED_PROXY_CIDR_2=::1/128 \
              "${edge_image}" >/dev/null; then
              append_result "route-method-deny" "fail" "Unable to start edge runtime container for drill."
              append_result "internal-namespace-deny" "fail" "Unable to start edge runtime container for drill."
              append_result "abuse-rate-limit" "fail" "Unable to start edge runtime container for drill."
              append_result "temporary-deny-window" "fail" "Unable to start edge runtime container for drill."
              return
            fi

            edge_port="$(docker port "${edge_name}" 443/tcp | sed -E 's/.*:([0-9]+)$/\1/' | head -n 1)"
            if [[ -z "${edge_port}" ]]; then
              append_result "route-method-deny" "fail" "Unable to resolve published edge HTTPS port."
              append_result "internal-namespace-deny" "fail" "Unable to resolve published edge HTTPS port."
              append_result "abuse-rate-limit" "fail" "Unable to resolve published edge HTTPS port."
              append_result "temporary-deny-window" "fail" "Unable to resolve published edge HTTPS port."
              return
            fi

            for _ in $(seq 1 20); do
              code="$(curl -k -s -o /tmp/dmz-health-body.json -w '%{http_code}' "https://localhost:${edge_port}/health/channel" || true)"
              if [[ "${code}" == "200" ]]; then
                break
              fi
              sleep 1
            done

            code="$(curl -k -s -o /tmp/dmz-route-deny.json -w '%{http_code}' -X POST "https://localhost:${edge_port}/health/channel" || true)"
            if [[ "${code}" == "404" ]] && grep -q 'EDGE_ROUTE_NOT_ALLOWED' /tmp/dmz-route-deny.json && grep -q '"request_id"' /tmp/dmz-route-deny.json; then
              append_result "route-method-deny" "pass" "Disallowed method returns deterministic 404 deny with request_id."
            else
              append_result "route-method-deny" "fail" "Disallowed method deny response contract failed."
            fi

            code="$(curl -k -s -o /tmp/dmz-internal-deny.json -w '%{http_code}' "https://localhost:${edge_port}/api/v1/corebank/health" || true)"
            if [[ "${code}" == "403" ]] && grep -q 'EDGE_ROUTE_FORBIDDEN' /tmp/dmz-internal-deny.json && grep -q '"request_id"' /tmp/dmz-internal-deny.json; then
              append_result "internal-namespace-deny" "pass" "Internal namespace returns deterministic 403 deny with request_id."
            else
              append_result "internal-namespace-deny" "fail" "Internal namespace deny response contract failed."
            fi

            for i in $(seq 1 120); do
              code="$(curl -k -s -o /tmp/dmz-unknown-${i}.json -w '%{http_code}' "https://localhost:${edge_port}/dmz-unknown-${i}" || true)"
              if [[ "${code}" == "429" ]]; then
                rl_hit=1
                break
              fi
            done
            if [[ "${rl_hit}" == "1" ]] && grep -q 'EDGE_RATE_LIMITED' /tmp/dmz-unknown-${i}.json && grep -q '"request_id"' /tmp/dmz-unknown-${i}.json && grep -q '"retry_after_seconds"' /tmp/dmz-unknown-${i}.json; then
              append_result "abuse-rate-limit" "pass" "Unknown-route flood returns 429 with retry metadata and request_id."
            else
              append_result "abuse-rate-limit" "fail" "Rate-limit contract failed to emit required 429 metadata."
            fi

            curl -k -s "https://localhost:${edge_port}/api/v1/channel/auth/session" >/dev/null || true
            client_ip="$(docker exec "${edge_name}" sh -lc "tail -n 1 /var/log/nginx/edge-access.log | sed -n 's/.*\"remote_addr\":\"\\([^\"]*\\)\".*/\\1/p'")"
            if [[ -n "${client_ip}" ]]; then
              docker exec "${edge_name}" /usr/local/bin/dmz-temp-denylist.sh apply "${client_ip}" 5 dmz_rate_limit_abuse "${GITHUB_RUN_ID}" >/tmp/dmz-temp-deny-apply.json
              code="$(curl -k -s -o /tmp/dmz-temp-deny-active.json -w '%{http_code}' "https://localhost:${edge_port}/api/v1/channel/auth/session" || true)"
              sleep 6
              docker exec "${edge_name}" /usr/local/bin/dmz-temp-denylist.sh sweep >/dev/null
              code_after="$(curl -k -s -o /tmp/dmz-temp-deny-expired.json -w '%{http_code}' "https://localhost:${edge_port}/api/v1/channel/auth/session" || true)"
              if [[ "${code}" == "403" ]] && grep -q 'EDGE_DMZ_TEMP_DENY' /tmp/dmz-temp-deny-active.json && [[ "${code_after}" != "403" ]]; then
                append_result "temporary-deny-window" "pass" "Temporary deny is applied and auto-expires."
              else
                append_result "temporary-deny-window" "fail" "Temporary deny apply/expiry behavior check failed."
              fi
            else
              append_result "temporary-deny-window" "fail" "Unable to resolve source IP for denylist application."
            fi
          }

          run_story_contract_scenarios() {
            local story_123_status
            local story_124_status

            story_123_status="$(awk '/^  12-3-service-boundary-trust-hardening-secret-rotation-mtls-readiness:/{print $2}' _bmad-output/implementation-artifacts/sprint-status.yaml)"
            if [[ "${story_123_status}" == "backlog" ]]; then
              if [[ "${DMZ_ENFORCE_TRUST_SCENARIOS}" == "true" ]]; then
                append_result "stale-secret-rejection" "fail" "Story 12.3 is backlog and trust-scenario enforcement is enabled."
              else
                append_result "stale-secret-rejection" "pending" "Story 12.3 is backlog; scenario is tracked but not enforced in this run."
              fi
            elif grep -q 'stale-secret requests are rejected' _bmad-output/planning-artifacts/epics.md && \
                 grep -q 'dual-secret overlap window of 15 minutes' _bmad-output/planning-artifacts/epics.md; then
              append_result "stale-secret-rejection" "pass" "Story 12.3 stale-secret rejection contract is present and story is not backlog."
            else
              append_result "stale-secret-rejection" "fail" "Story 12.3 stale-secret rejection contract is missing."
            fi

            story_124_status="$(awk '/^  12-4-admin-access-control-path-for-dmz-operations:/{print $2}' _bmad-output/implementation-artifacts/sprint-status.yaml)"
            if [[ "${story_124_status}" == "backlog" ]]; then
              if [[ "${DMZ_ENFORCE_TRUST_SCENARIOS}" == "true" ]]; then
                append_result "admin-credential-ttl-expiry" "fail" "Story 12.4 is backlog and trust-scenario enforcement is enabled."
              else
                append_result "admin-credential-ttl-expiry" "pending" "Story 12.4 is backlog; scenario is tracked but not enforced in this run."
              fi
            elif grep -q 'TTL at or below 30 minutes' _bmad-output/planning-artifacts/epics.md && \
                 grep -q 'auto-revoked' _bmad-output/planning-artifacts/epics.md && \
                 grep -q 'ticket-id' _bmad-output/planning-artifacts/epics.md; then
              append_result "admin-credential-ttl-expiry" "pass" "Story 12.4 admin credential TTL + audit mandatory fields contract is present and story is not backlog."
            else
              append_result "admin-credential-ttl-expiry" "fail" "Story 12.4 TTL/audit contract is missing."
            fi
          }

          run_blocked_direct_internal_access
          run_edge_runtime_scenarios
          run_story_contract_scenarios

          cat > "${OUT_DIR}/summary-index.json" <<JSON
          {"generated_by":"dmz-security-drill","owner":"${DMZ_DRILL_OWNER}","checked_at":"${TS}","results":[${RESULTS_JSON}],"fail_count":${FAIL_COUNT}}
          JSON
          cp "${OUT_DIR}/summary-index.json" "${OUT_DIR}/summary-index-${TS}.json"

          if [[ "${FAIL_COUNT}" -gt 0 ]]; then
            echo "drill_status=fail" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "drill_status=pass" >> "$GITHUB_OUTPUT"

      - name: Upload drill evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dmz-drill-${{ steps.meta.outputs.day }}-${{ steps.meta.outputs.ts }}
          path: ${{ steps.meta.outputs.out_dir }}
          retention-days: 35
