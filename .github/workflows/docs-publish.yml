name: Publish API Docs to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'BE'
      - 'BE/**'
      - 'docker/vault/**'
      - '.github/workflows/docs-publish.yml'

permissions:
  contents: write
  id-token: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          # Use a PAT for private submodules when available; fall back to repo token.
          token: ${{ secrets.SUBMODULES_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Vault CLI for OIDC login
        if: ${{ !env.ACT && env.VAULT_ADDR != '' }}
        shell: bash
        run: |
          set -euo pipefail
          VAULT_VERSION="1.15.6"
          curl -fsSLo vault.zip "https://releases.hashicorp.com/vault/${VAULT_VERSION}/vault_${VAULT_VERSION}_linux_amd64.zip"
          curl -fsSLo vault_SHA256SUMS "https://releases.hashicorp.com/vault/${VAULT_VERSION}/vault_${VAULT_VERSION}_SHA256SUMS"
          grep "vault_${VAULT_VERSION}_linux_amd64.zip" vault_SHA256SUMS > vault_SHA256SUMS_linux_amd64.txt
          sha256sum -c vault_SHA256SUMS_linux_amd64.txt
          unzip -q vault.zip
          sudo install vault /usr/local/bin/vault
          vault -version

      - name: Resolve INTERNAL_SECRET from Vault using GitHub OIDC
        if: ${{ !env.ACT && env.VAULT_ADDR != '' }}
        shell: bash
        env:
          VAULT_OIDC_AUDIENCE: ${{ vars.VAULT_OIDC_AUDIENCE || format('https://github.com/{0}', github.repository_owner) }}
        run: |
          set -euo pipefail
          oidc_response="$(
            curl -sSfL \
              -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${VAULT_OIDC_AUDIENCE}"
          )"
          oidc_jwt="$(python3 -c 'import json,sys; print(json.load(sys.stdin)["value"])' <<< "${oidc_response}")"
          vault_token="$(vault write -field=token auth/jwt/login role=ci-docs-publish jwt="${oidc_jwt}")"
          internal_secret="$(
            VAULT_TOKEN="${vault_token}" \
              vault kv get -field=value secret/fix/shared/core-services/internal-secret
          )"
          echo "::add-mask::${internal_secret}"
          echo "INTERNAL_SECRET=${internal_secret}" >> "${GITHUB_ENV}"
          echo "VAULT_SECRET_MODE=vault" >> "${GITHUB_ENV}"

      - name: Mark controlled degraded mode when Vault is not configured
        if: ${{ env.ACT || env.VAULT_ADDR == '' }}
        run: |
          echo "VAULT_SECRET_MODE=degraded" >> "${GITHUB_ENV}"

      - name: Restore Node PATH for act compatibility
        if: ${{ env.ACT }}
        shell: bash
        run: |
          set -euo pipefail
          node_bin=""
          for candidate in /opt/acttoolcache/node/*/x64/bin/node /usr/local/bin/node /usr/bin/node; do
            if [ -x "$candidate" ]; then
              dir="$(dirname "$candidate")"
              echo "$dir" >> "$GITHUB_PATH"
              if [ -z "$node_bin" ]; then
                node_bin="$dir"
              fi
            fi
          done
          if [ -n "$node_bin" ]; then
            export PATH="$node_bin:$PATH"
          fi
          command -v node
          node -v

      - name: Generate OpenAPI specs (build-time, no Docker needed)
        working-directory: BE
        run: |
          ./gradlew :channel-service:generateOpenApiDocs \
                    :corebank-service:generateOpenApiDocs \
                    :fep-gateway:generateOpenApiDocs \
                    :fep-simulator:generateOpenApiDocs

      - name: Assemble static docs site
        run: |
          mkdir -p docs-site
          cp BE/channel-service/build/openapi/channel-service.json docs-site/channel.json
          cp BE/corebank-service/build/openapi/corebank-service.json docs-site/corebank.json
          cp BE/fep-gateway/build/openapi/fep-gateway.json docs-site/fep-gateway.json
          cp BE/fep-simulator/build/openapi/fep-simulator.json docs-site/fep-simulator.json
          python3 - << 'PY'
          import json
          import pathlib

          for name in ("channel.json", "corebank.json", "fep-gateway.json", "fep-simulator.json"):
              p = pathlib.Path("docs-site") / name
              data = json.loads(p.read_text(encoding="utf-8"))
              assert str(data.get("openapi", "")).startswith("3.0"), f"{name}: openapi version missing/invalid"
              assert "paths" in data and isinstance(data["paths"], dict), f"{name}: paths missing"
          print("OpenAPI structural validation passed")
          PY
          cat > docs-site/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>FIX API Docs</title>
            <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui.css">
          </head>
          <body>
          <div id="swagger-ui"></div>
          <script src="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui-bundle.js"></script>
          <script src="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui-standalone-preset.js"></script>
          <script>
            SwaggerUIBundle({
              urls: [
                { url: "channel.json", name: "Channel Service" },
                { url: "corebank.json", name: "CoreBank Service" },
                { url: "fep-gateway.json", name: "FEP Gateway" },
                { url: "fep-simulator.json", name: "FEP Simulator" }
              ],
              "urls.primaryName": "Channel Service",
              dom_id: "#swagger-ui",
              deepLinking: true,
              presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
              layout: "StandaloneLayout"
            });
          </script>
          </body>
          </html>
          HTML

      - name: Deploy to GitHub Pages
        if: ${{ !env.ACT }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs-site
          force_orphan: true
          commit_message: "docs: update API specs from ${{ github.sha }}"
