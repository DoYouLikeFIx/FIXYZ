name: Publish API Docs to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'BE'
      - 'BE/**'
      - 'docker/vault/**'
      - '.github/scripts/vault/**'
      - '.github/vault-protected-workflows.txt'
      - '.github/workflows/docs-publish.yml'

permissions:
  contents: write
  id-token: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
      VAULT_CA_CERT_PEM: ${{ secrets.VAULT_CA_CERT_PEM }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          submodules: recursive
          # Use a PAT for private submodules when available; fall back to repo token.
          token: ${{ secrets.SUBMODULES_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Materialize Vault CA trust bundle
        if: ${{ !env.ACT && env.VAULT_ADDR != '' && env.VAULT_CA_CERT_PEM != '' }}
        shell: bash
        run: |
          set -euo pipefail
          printf '%s\n' "${VAULT_CA_CERT_PEM}" > "${RUNNER_TEMP}/vault-ca.pem"
          chmod 600 "${RUNNER_TEMP}/vault-ca.pem"
          echo "VAULT_CACERT=${RUNNER_TEMP}/vault-ca.pem" >> "${GITHUB_ENV}"

      - name: Install Vault CLI for OIDC login
        if: ${{ !env.ACT && env.VAULT_ADDR != '' }}
        shell: bash
        run: |
          set -euo pipefail
          VAULT_VERSION="1.15.6"
          curl -fsSLo vault.zip "https://releases.hashicorp.com/vault/${VAULT_VERSION}/vault_${VAULT_VERSION}_linux_amd64.zip"
          curl -fsSLo vault_SHA256SUMS "https://releases.hashicorp.com/vault/${VAULT_VERSION}/vault_${VAULT_VERSION}_SHA256SUMS"
          grep "vault_${VAULT_VERSION}_linux_amd64.zip" vault_SHA256SUMS > vault_SHA256SUMS_linux_amd64.txt
          sha256sum -c vault_SHA256SUMS_linux_amd64.txt
          unzip -q vault.zip
          sudo install vault /usr/local/bin/vault
          vault -version

      - name: Enter degraded mode when Vault is not configured
        if: ${{ env.ACT || env.VAULT_ADDR == '' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "VAULT_SECRET_MODE=degraded" >> "${GITHUB_ENV}"
          if [[ -n "${ACT:-}" ]]; then
            echo "[vault-gha] act runner detected; skipping Vault resolution"
          else
            echo "[vault-gha] VAULT_ADDR is not configured; skipping Vault resolution"
          fi

      - name: Resolve INTERNAL_SECRET with protected Vault guardrails
        if: ${{ !env.ACT && env.VAULT_ADDR != '' }}
        shell: bash
        env:
          VAULT_OIDC_AUDIENCE: ${{ vars.VAULT_OIDC_AUDIENCE || format('https://github.com/{0}', github.repository_owner) }}
          VAULT_PROTECTED_WORKFLOWS_FILE: .github/vault-protected-workflows.txt
        run: |
          # Resolver performs: vault write -field=token auth/jwt/login role=ci-docs-publish
          bash ./.github/scripts/vault/resolve-internal-secret.sh

      - name: Restore Node PATH for act compatibility
        if: ${{ env.ACT }}
        shell: bash
        run: |
          set -euo pipefail
          node_bin=""
          for candidate in /opt/acttoolcache/node/*/x64/bin/node /usr/local/bin/node /usr/bin/node; do
            if [ -x "$candidate" ]; then
              dir="$(dirname "$candidate")"
              echo "$dir" >> "$GITHUB_PATH"
              if [ -z "$node_bin" ]; then
                node_bin="$dir"
              fi
            fi
          done
          if [ -n "$node_bin" ]; then
            export PATH="$node_bin:$PATH"
          fi
          command -v node
          node -v

      - name: Generate OpenAPI specs (build-time, no Docker needed)
        working-directory: BE
        run: |
          ./gradlew :channel-service:refreshOpenApiDocs \
                    :corebank-service:refreshOpenApiDocs \
                    :fep-gateway:refreshOpenApiDocs \
                    :fep-simulator:refreshOpenApiDocs

      - name: Assemble static docs site
        run: |
          node BE/scripts/assemble-openapi-docs-site.mjs --repo-root "$PWD" --output-dir "$PWD/docs-site"

      - name: Deploy to GitHub Pages
        if: ${{ !env.ACT }}
        uses: peaceiris/actions-gh-pages@e9c66a37f080288a11235e32cbe2dc5fb3a679cc
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs-site
          force_orphan: true
          commit_message: "docs: update API specs from ${{ github.sha }}"
